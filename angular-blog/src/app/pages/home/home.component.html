<header class="masthead">
  <app-navbar></app-navbar>
</header>

<section class="blog-slider">
  <div class="slider-window">
    <div class="slider-track" [style.transform]="trackTransform">
      <div class="slide" *ngFor="let slide of slides; let i = index">
        <div class="slide-right">
          <div class="editorial-layout">
            <div class="col-left">
              <span class="vertical-title">{{ slide.leftLabel }}</span>
            </div>
            <div class="col-main">
              <p class="tag">{{ slide.meta }}</p>
              <h1>{{ slide.title }}</h1>
              <div class="body-text">
                <p>{{ slide.description }}</p>
                <p>{{ slide.detail }}</p>
              </div>
              <div class="meta-row">
                <span class="pill-label">{{ slide.date }}</span>
                <span class="pill-label ghost">{{ slide.category }}</span>
              </div>
              <div class="nav-arrows" aria-label="Navegação de slides">
                <button aria-label="Anterior" (click)="prevSlide()">←</button>
                <button aria-label="Próximo" (click)="nextSlide()">→</button>
              </div>
            </div>
            <div class="col-right">
              <span class="vertical-title">{{ slide.rightLabel }}</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="prev-button" aria-label="Slide anterior" (click)="prevSlide()">←</button>
    <div class="dots">
      <button *ngFor="let slide of slides; let i = index"
              class="dot" [class.active]="i === currentIndex"
              (click)="goToSlide(i)" aria-label="Ir para slide {{i + 1}}"></button>
    </div>
    <button class="next-button" aria-label="Próximo slide" (click)="nextSlide()">→</button>
  </div>
</section>
